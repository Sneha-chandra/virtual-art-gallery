<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArtVerse — Virtual AI Art Gallery</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;--bg2:#0f0f1a;--bg3:#161624;
  --gold:#c9a84c;--gold-light:#f0d080;--gold-dim:rgba(201,168,76,.15);
  --frame:#1a1408;--text:#e8dcc8;--muted:#8a7a6a;--radius:2px;
}
body{background:var(--bg);color:var(--text);font-family:'Georgia',serif;min-height:100vh;overflow-x:hidden}

/* ── Header ── */
header{background:rgba(8,8,16,.97);border-bottom:1px solid rgba(201,168,76,.18);padding:0 32px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header-inner{max-width:1240px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:62px}
.logo{font-size:20px;font-weight:bold;letter-spacing:4px;color:var(--gold);text-transform:uppercase}
.logo span{color:var(--text);font-weight:300;letter-spacing:2px}
.header-btns{display:flex;gap:10px;align-items:center}
.btn{background:transparent;border:1px solid rgba(201,168,76,.35);color:var(--gold);padding:7px 18px;border-radius:1px;cursor:pointer;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;transition:.3s;font-family:'Georgia',serif}
.btn:hover{background:rgba(201,168,76,.08);border-color:var(--gold)}
.btn.active{background:var(--gold);color:#000;border-color:var(--gold)}

/* ── Scene ── */
.gallery-scene{min-height:calc(100vh - 62px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px 120px;position:relative;overflow:hidden}
.gallery-scene::before{content:'';position:fixed;top:0;left:50%;transform:translateX(-50%);width:600px;height:100vh;background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,.06) 0%,transparent 55%);pointer-events:none;z-index:0}

/* ── Room dots ── */
.room-dots{display:flex;gap:10px;margin-bottom:36px;position:relative;z-index:1}
.r-dot{width:7px;height:7px;border-radius:50%;background:rgba(201,168,76,.25);cursor:pointer;transition:.3s}
.r-dot.active{background:var(--gold);transform:scale(1.4)}
.r-dot:hover{background:rgba(201,168,76,.6)}

/* ── Gallery display ── */
.gallery-display{display:flex;align-items:center;gap:36px;width:100%;max-width:1100px;position:relative;z-index:1}
.art-slot{transition:all .65s cubic-bezier(.4,0,.2,1);cursor:pointer;position:relative;flex-shrink:0}
.art-slot.prev{width:200px;opacity:.38;filter:blur(.8px) brightness(.65);transform:perspective(900px) rotateY(20deg) scale(.8)}
.art-slot.next{width:200px;opacity:.38;filter:blur(.8px) brightness(.65);transform:perspective(900px) rotateY(-20deg) scale(.8)}
.art-slot.prev:hover{opacity:.6;filter:blur(0) brightness(.8)}
.art-slot.next:hover{opacity:.6;filter:blur(0) brightness(.8)}
.art-slot.current{flex:1;max-width:620px}

/* ── Spotlight ── */
.art-slot.current::before{content:'';position:absolute;top:-70px;left:50%;transform:translateX(-50%);width:220px;height:70px;background:radial-gradient(ellipse,rgba(255,240,160,.14) 0%,transparent 70%);pointer-events:none}

/* ── Frame ── */
.art-frame{position:relative;background:var(--frame);border:10px solid #15100a;box-shadow:0 0 0 2px #3a2e10,0 0 0 4px #15100a,0 40px 100px rgba(0,0,0,.9),0 0 60px rgba(201,168,76,.04)}
.art-slot.current .art-frame{border:16px solid #15100a;box-shadow:0 0 0 2px #4a3e18,0 0 0 5px #15100a,0 50px 130px rgba(0,0,0,.95),0 0 100px rgba(201,168,76,.08)}

.art-img{display:block;width:100%;object-fit:cover;aspect-ratio:4/3;transition:opacity .5s}
.art-slot.current .art-img{aspect-ratio:auto;max-height:54vh;object-fit:contain}

/* Ken Burns on current */
@keyframes kenburns{0%{transform:scale(1) translate(0,0)}50%{transform:scale(1.05) translate(-1.5%,-1%)}100%{transform:scale(1) translate(0,0)}}
.art-slot.current .art-img{animation:kenburns 14s ease-in-out infinite}

/* ── Info row ── */
.info-row{display:flex;align-items:center;gap:28px;margin-top:42px;position:relative;z-index:1}
.nav-btn{width:50px;height:50px;border:1px solid rgba(201,168,76,.35);border-radius:50%;background:transparent;color:var(--gold);font-size:20px;cursor:pointer;transition:.3s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-btn:hover{background:rgba(201,168,76,.1);border-color:var(--gold);transform:scale(1.05)}
.art-info{text-align:center;max-width:540px}
.art-title{font-size:26px;font-weight:bold;color:var(--text);margin-bottom:6px;letter-spacing:.3px}
.art-meta{font-size:13px;color:var(--muted);font-style:italic;margin-bottom:6px}
.art-counter{font-size:10px;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:16px}
.info-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* ── Narration bar ── */
.narration-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(8,8,16,.98);border-top:1px solid rgba(201,168,76,.18);padding:18px 32px 22px;transform:translateY(100%);transition:.4s cubic-bezier(.4,0,.2,1);z-index:90;backdrop-filter:blur(12px)}
.narration-bar.open{transform:translateY(0)}
.narration-inner{max-width:840px;margin:0 auto;position:relative}
.narration-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.narr-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:blink 1.1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.narration-text{font-size:13.5px;line-height:1.85;color:var(--text);font-style:italic}
.narr-close{position:absolute;right:0;top:0;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;line-height:1}
.narr-close:hover{color:var(--gold)}

/* ── Tour badge ── */
.tour-badge{position:fixed;top:72px;left:24px;background:rgba(8,8,16,.92);border:1px solid rgba(201,168,76,.2);border-radius:2px;padding:10px 16px;font-size:11px;color:var(--gold);z-index:80;display:none;letter-spacing:1px}
.tour-badge.on{display:block}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:.3s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid rgba(201,168,76,.18);max-width:940px;width:100%;max-height:90vh;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;transform:translateY(20px);transition:.3s}
.modal-bg.open .modal{transform:translateY(0)}
.modal-left{position:relative;background:#050508;min-height:420px;display:flex;align-items:center;justify-content:center}
.modal-canvas{display:block;cursor:crosshair;width:100%;height:100%}
.modal-right{padding:34px}
.m-title{font-size:24px;margin-bottom:4px}
.m-artist{color:var(--gold);font-size:13px;margin-bottom:24px;letter-spacing:.5px}
.det-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px}
.det-label{color:var(--muted)}
.det-val{color:var(--text);text-align:right;max-width:55%}
.m-desc{margin-top:20px;font-size:12.5px;line-height:1.85;color:#a09080;font-style:italic}
.m-actions{display:flex;gap:10px;margin-top:24px;flex-wrap:wrap}
.zoom-hint{font-size:10px;color:var(--muted);text-align:center;margin-top:8px;letter-spacing:1px}
.modal-close-btn{position:absolute;top:14px;right:14px;background:rgba(0,0,0,.6);border:1px solid rgba(201,168,76,.25);color:var(--gold);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.modal-close-btn:hover{border-color:var(--gold)}

/* ── Help strip ── */
.help-strip{font-size:10.5px;color:var(--muted);letter-spacing:1.2px;margin-top:12px;text-align:center;position:relative;z-index:1}

@media(max-width:720px){
  .art-slot.prev,.art-slot.next{display:none}
  .modal{grid-template-columns:1fr}
  .modal-left{min-height:240px}
  .logo{font-size:16px;letter-spacing:2px}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">Art<span>Verse</span></div>
    <div class="header-btns">
      <button class="btn" id="tour-btn" onclick="toggleTour()">▶ Guided Tour</button>
      <button class="btn" id="snd-btn" onclick="toggleAmbient()">♪ Ambient Sound</button>
      <button class="btn" onclick="showHelp()">? Help</button>
    </div>
  </div>
</header>

<div class="gallery-scene">
  <div class="room-dots" id="room-dots"></div>

  <div class="gallery-display" id="gallery-display">
    <div class="art-slot prev" id="slot-prev" onclick="navigate(-1)">
      <div class="art-frame"><img class="art-img" id="img-prev" src="" alt=""></div>
    </div>
    <div class="art-slot current" id="slot-cur" onclick="openModal()">
      <div class="art-frame"><img class="art-img" id="img-cur" src="" alt=""></div>
    </div>
    <div class="art-slot next" id="slot-next" onclick="navigate(1)">
      <div class="art-frame"><img class="art-img" id="img-next" src="" alt=""></div>
    </div>
  </div>

  <div class="info-row">
    <button class="nav-btn" onclick="navigate(-1)">←</button>
    <div class="art-info">
      <div class="art-title" id="a-title"></div>
      <div class="art-meta" id="a-meta"></div>
      <div class="art-counter" id="a-counter"></div>
      <div class="info-btns">
        <button class="btn" onclick="openModal()">🖼 View Details</button>
        <button class="btn" onclick="narrate()">🔊 AI Narration</button>
      </div>
    </div>
    <button class="nav-btn" onclick="navigate(1)">→</button>
  </div>

  <div class="help-strip">← → Arrow keys &nbsp;·&nbsp; Space = AI narration &nbsp;·&nbsp; Click artwork = zoom &amp; detail</div>
</div>

<!-- Narration bar -->
<div class="narration-bar" id="narr-bar">
  <div class="narration-inner">
    <button class="narr-close" onclick="closeNarr()">✕</button>
    <div class="narration-label"><div class="narr-dot"></div>AI Gallery Curator</div>
    <div class="narration-text" id="narr-text"></div>
  </div>
</div>

<!-- Tour badge -->
<div class="tour-badge" id="tour-badge">🎧 Guided Tour &nbsp;·&nbsp; <span id="t-pos">1</span> / <span id="t-tot">8</span></div>

<!-- Detail modal -->
<div class="modal-bg" id="modal-bg" onclick="closeMBg(event)">
  <div class="modal" id="modal">
    <div class="modal-left" id="modal-left">
      <canvas class="modal-canvas" id="modal-canvas"></canvas>
      <button class="modal-close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-right">
      <div class="m-title" id="m-title"></div>
      <div class="m-artist" id="m-artist"></div>
      <div id="m-details"></div>
      <div class="m-desc" id="m-desc"></div>
      <div class="m-actions">
        <button class="btn active" onclick="narrateModal()">🔊 Hear AI Narration</button>
        <button class="btn" onclick="stopSpeak()">⏹ Stop</button>
      </div>
      <div class="zoom-hint">Scroll to zoom · Drag to pan · Double-click to reset</div>
    </div>
  </div>
</div>

<script>
const ARTWORKS=[
  {title:"The Starry Night",artist:"Vincent van Gogh",year:1889,medium:"Oil on canvas",dim:"73.7 × 92.1 cm",loc:"MoMA, New York",img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg/800px-Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg",desc:"Painted from Van Gogh's asylum room window before sunrise, depicting the village of Saint-Rémy under a turbulent, swirling night sky.",narr:"Standing before The Starry Night, we witness van Gogh's extraordinary ability to transform nocturnal landscape into swirling emotional energy. Painted in June 1889 from his room at the Saint-Paul-de-Mausole asylum, the eleven turbulent clouds spiral across the sky in hypnotic motion. The cypress tree reaches skyward like a dark flame, bridging earth and heaven. Notice how the peaceful village below contrasts sharply with the cosmic drama above — a meditation on the tension between earthly existence and the infinite universe. Van Gogh's thick impasto strokes give this work a tactile intensity that no photograph can fully capture."},
  {title:"Girl with a Pearl Earring",artist:"Johannes Vermeer",year:1665,medium:"Oil on canvas",dim:"44.5 × 39 cm",loc:"Mauritshuis, The Hague",img:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/1665_Girl_with_a_Pearl_Earring.jpg/600px-1665_Girl_with_a_Pearl_Earring.jpg",desc:"A tronie depicting a European girl wearing an exotic dress, an oriental turban, and a luminous pearl earring.",narr:"Often called the Mona Lisa of the North, Vermeer's Girl with a Pearl Earring is a masterwork of intimate portraiture. The subject is not identified — she is frozen in a moment of turning, her eyes meeting ours with an expression that mingles curiosity, invitation, and mystery. Vermeer's handling of light is extraordinary: the warm glow on her face emerges from darkness as if from within, while the single pearl earring captures an entire world of reflected light in its luminous surface. For over three centuries this painting has captivated everyone who stands before it."},
  {title:"The Great Wave",artist:"Katsushika Hokusai",year:1831,medium:"Woodblock print",dim:"25.7 × 37.9 cm",loc:"Metropolitan Museum of Art",img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Tsunami_by_hokusai_19th_century.jpg/800px-Tsunami_by_hokusai_19th_century.jpg",desc:"Part of the series Thirty-six Views of Mount Fuji, showing an enormous wave threatening fishing boats off Kanagawa.",narr:"Hokusai's Great Wave is perhaps the most recognizable image in the history of Japanese art. Created when the artist was in his seventies, it captures a sublime and terrifying moment — fishing boats engulfed by a towering wall of water, with Mount Fuji reduced to a small, calm triangle in the distance. The wave's claw-like foam fingers reach downward with predatory intent. Hokusai uses the contrast between violent nature and composed mountain to explore the Zen relationship between the transient and the eternal. This single print influenced European Impressionism and remains a universal symbol of nature's overwhelming power."},
  {title:"The Persistence of Memory",artist:"Salvador Dalí",year:1931,medium:"Oil on canvas",dim:"24.1 × 33 cm",loc:"MoMA, New York",img:"https://upload.wikimedia.org/wikipedia/en/d/dd/The_Persistence_of_Memory.jpg",desc:"A surrealist masterpiece featuring soft melting watches draped across a barren Catalan landscape.",narr:"In The Persistence of Memory, Salvador Dalí created one of Surrealism's most enduring images — melting watches draped across a dreamlike coastal landscape. Painted in just two hours, Dalí described his method as hand-painted dream photographs. The soft watches mock the rigid structure of time, suggesting that our perception of time is malleable, subjective, and ultimately illusory. The fly-covered watch represents decay. In the distance, Dalí's own distorted face lies melting in the landscape. This tiny painting — barely the size of a sheet of paper — challenged everything Western civilization believed about objective reality."},
  {title:"The Birth of Venus",artist:"Sandro Botticelli",year:1485,medium:"Tempera on canvas",dim:"172.5 × 278.9 cm",loc:"Uffizi Gallery, Florence",img:"https://upload.wikimedia.org/wikipedia/commons/thumb/2/26/Sandro_Botticelli_-_La_nascita_di_Venere_-_Google_Art_Project_-_edited.jpg/800px-Sandro_Botticelli_-_La_nascita_di_Venere_-_Google_Art_Project_-_edited.jpg",desc:"The Renaissance goddess Venus rises from the sea on a giant scallop shell, representing the birth of beauty and divine love.",narr:"Botticelli's Birth of Venus announced the Renaissance rediscovery of classical beauty with breathtaking confidence. Venus — Roman goddess of love — rises from the sea on a giant scallop shell, her golden hair stirred by the breath of Zephyr and Chloris on the left, while a Hora offers a flower-embroidered robe on the right. The painting was revolutionary in its time: the first large-scale nude in Western art since antiquity. Yet Venus is no mere physical body — she embodies the Neoplatonic ideal of spiritual beauty, the divine made visible in human form."},
  {title:"The Scream",artist:"Edvard Munch",year:1893,medium:"Oil, tempera and pastel",dim:"91 × 73.5 cm",loc:"National Gallery, Oslo",img:"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Edvard_Munch%2C_1893%2C_The_Scream%2C_oil%2C_tempera_and_pastel_on_cardboard%2C_91_x_73_cm%2C_National_Gallery_of_Norway.jpg/600px-Edvard_Munch%2C_1893%2C_The_Scream%2C_oil%2C_tempera_and_pastel_on_cardboard%2C_91_x_73_cm%2C_National_Gallery_of_Norway.jpg",desc:"An expressionist icon depicting anguished anxiety against a blood-red swirling sky.",narr:"The Scream is modern anxiety made visible. Munch wrote of the experience that inspired it: I was walking along the road with friends when the sun set. Suddenly the sky turned blood red. I stopped and leaned against the fence, feeling unspeakably tired. I saw the flaming clouds like blood and a sword. My friends walked on, and I stood there trembling with anxiety — and I sensed an endless scream passing through nature. The central figure has become a face without identity — a universal mask of existential dread. Munch painted The Scream four times, as if once could never be enough to exorcise the terror within it."},
  {title:"La Grande Jatte",artist:"Georges Seurat",year:1886,medium:"Oil on canvas",dim:"207.5 × 308 cm",loc:"Art Institute of Chicago",img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7d/A_Sunday_on_La_Grande_Jatte%2C_Georges_Seurat%2C_1884.jpg/800px-A_Sunday_on_La_Grande_Jatte%2C_Georges_Seurat%2C_1884.jpg",desc:"Parisians relaxing along the Seine, composed entirely from thousands of tiny dots of pure colour — the birth of Pointillism.",narr:"Seurat's monumental La Grande Jatte is both a technical revolution and a quiet meditation on modern leisure. Painted entirely using Pointillism — thousands of tiny dots of pure color placed side by side to blend optically in the viewer's eye — the painting took Seurat over two years to complete. The figures, bathed in bright afternoon sunlight along the Seine, are strangely still, almost hieratic. Look closely and the entire painting dissolves into colored dots. Step back and a sunlit world of extraordinary richness appears. That transformation is Seurat's genius — and his gift to us."},
  {title:"Mona Lisa",artist:"Leonardo da Vinci",year:1517,medium:"Oil on poplar panel",dim:"77 × 53 cm",loc:"Louvre Museum, Paris",img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Mona_Lisa%2C_by_Leonardo_da_Vinci%2C_from_C2RMF_retouched.jpg/600px-Mona_Lisa%2C_by_Leonardo_da_Vinci%2C_from_C2RMF_retouched.jpg",desc:"The world's most recognized painting, renowned for the subject's enigmatic expression and Leonardo's revolutionary sfumato technique.",narr:"Standing before the Mona Lisa, one confronts the most famous painting in human history — and the most mysterious. Leonardo's sfumato technique — the subtle blending of light and shadow without hard lines — gives Lisa Gherardini's expression its extraordinary ambiguity. Is she smiling? The answer changes depending on where your eye rests. Scientific analysis has revealed that Leonardo painted at least thirty thin glazes of oil, each just a few micrometers thick, to achieve this otherworldly luminosity. After five centuries, the Mona Lisa continues to look back at everyone who looks at her — and gives nothing away."}
];

let idx=0,tourOn=false,synth=window.speechSynthesis,audioCtx=null,ambOn=false;
let ambNodes=[],zImg=null,zScale=1,zPanX=0,zPanY=0,isDrag=false,lx=0,ly=0;

function init(){
  document.getElementById('t-tot').textContent=ARTWORKS.length;
  renderDots();renderGallery();initCanvas();
  if(synth)synth.onvoiceschanged=()=>synth.getVoices();
}

function renderDots(){
  document.getElementById('room-dots').innerHTML=ARTWORKS.map((_,i)=>
    `<div class="r-dot${i===idx?' active':''}" onclick="goTo(${i})"></div>`).join('');
}

function renderGallery(){
  const n=ARTWORKS.length;
  const prev=ARTWORKS[(idx-1+n)%n],cur=ARTWORKS[idx],nxt=ARTWORKS[(idx+1)%n];
  ['prev','cur','next'].forEach((k,i)=>{
    const art=[prev,cur,nxt][i];
    document.getElementById(`img-${k}`).src=art.img;
    document.getElementById(`img-${k}`).alt=art.title;
  });
  document.getElementById('a-title').textContent=cur.title;
  document.getElementById('a-meta').textContent=`${cur.artist} · ${cur.year} · ${cur.medium}`;
  document.getElementById('a-counter').textContent=`${idx+1} of ${ARTWORKS.length}`;
  document.getElementById('t-pos').textContent=idx+1;
  renderDots();closeNarr();
}

function navigate(d){idx=(idx+d+ARTWORKS.length)%ARTWORKS.length;renderGallery();if(tourOn)setTimeout(()=>narrate(),600)}
function goTo(i){idx=i;renderGallery()}

// ── TTS Narration ────────────────────────────────────────────────────────────
function speak(text){
  if(!synth)return;synth.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=0.88;u.pitch=1.05;u.volume=0.96;
  const voices=synth.getVoices();
  const v=voices.find(v=>/samantha|karen|moira|victoria|serena|daniel/i.test(v.name))
    ||voices.find(v=>v.lang==='en-GB')||voices.find(v=>v.lang.startsWith('en'))||voices[0];
  if(v)u.voice=v;
  u.onend=()=>{if(tourOn)setTimeout(()=>navigate(1),1800)};
  synth.speak(u);
}
function stopSpeak(){if(synth)synth.cancel()}

function narrate(){
  const art=ARTWORKS[idx];
  document.getElementById('narr-text').textContent=art.narr;
  document.getElementById('narr-bar').classList.add('open');
  speak(art.narr);
}
function narrateModal(){narrate()}
function closeNarr(){document.getElementById('narr-bar').classList.remove('open');stopSpeak()}

// ── Guided Tour ──────────────────────────────────────────────────────────────
function toggleTour(){
  tourOn=!tourOn;
  const b=document.getElementById('tour-btn'),bd=document.getElementById('tour-badge');
  if(tourOn){b.textContent='⏸ Stop Tour';b.classList.add('active');bd.classList.add('on');narrate()}
  else{b.textContent='▶ Guided Tour';b.classList.remove('active');bd.classList.remove('on');stopSpeak();closeNarr()}
}

// ── Ambient Sound (Web Audio API) ─────────────────────────────────────────────
function toggleAmbient(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  ambOn=!ambOn;
  const b=document.getElementById('snd-btn');
  if(ambOn){startAmb();b.classList.add('active');b.textContent='♪ Mute'}
  else{stopAmb();b.classList.remove('active');b.textContent='♪ Ambient Sound'}
}

function startAmb(){
  stopAmb();
  [55,110,165,220,330].forEach((f,i)=>{
    const osc=audioCtx.createOscillator(),gain=audioCtx.createGain(),flt=audioCtx.createBiquadFilter();
    osc.type='sine';osc.frequency.value=f;
    flt.type='lowpass';flt.frequency.value=350;
    gain.gain.setValueAtTime(0,audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(.014/(i+1),audioCtx.currentTime+2.5);
    osc.connect(flt);flt.connect(gain);gain.connect(audioCtx.destination);
    osc.start();ambNodes.push({osc,gain});
  });
}

function stopAmb(){
  ambNodes.forEach(({osc,gain})=>{
    gain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+1.2);
    setTimeout(()=>{try{osc.stop()}catch(e){}},1300);
  });
  ambNodes=[];
}

// ── Modal & Canvas Zoom ──────────────────────────────────────────────────────
function openModal(){
  const art=ARTWORKS[idx];
  document.getElementById('m-title').textContent=art.title;
  document.getElementById('m-artist').textContent=art.artist;
  document.getElementById('m-details').innerHTML=
    `<div class="det-row"><span class="det-label">Year</span><span class="det-val">${art.year}</span></div>
     <div class="det-row"><span class="det-label">Medium</span><span class="det-val">${art.medium}</span></div>
     <div class="det-row"><span class="det-label">Dimensions</span><span class="det-val">${art.dim}</span></div>
     <div class="det-row"><span class="det-label">Location</span><span class="det-val">${art.loc}</span></div>`;
  document.getElementById('m-desc').textContent=art.desc;
  document.getElementById('modal-bg').classList.add('open');
  loadCanvas(art.img);
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');stopSpeak()}
function closeMBg(e){if(e.target===document.getElementById('modal-bg'))closeModal()}

function initCanvas(){
  const cv=document.getElementById('modal-canvas'),ctx=cv.getContext('2d');
  cv.addEventListener('wheel',e=>{e.preventDefault();const d=e.deltaY<0?1.12:.9;zScale=Math.min(8,Math.max(.5,zScale*d));drawCanvas(cv,ctx)},{passive:false});
  cv.addEventListener('mousedown',e=>{isDrag=true;lx=e.clientX;ly=e.clientY});
  cv.addEventListener('mousemove',e=>{if(!isDrag)return;zPanX+=e.clientX-lx;zPanY+=e.clientY-ly;lx=e.clientX;ly=e.clientY;drawCanvas(cv,ctx)});
  cv.addEventListener('mouseup',()=>isDrag=false);
  cv.addEventListener('mouseleave',()=>isDrag=false);
  cv.addEventListener('dblclick',()=>{zScale=1;zPanX=0;zPanY=0;drawCanvas(cv,ctx)});
  // Touch support
  let t0=null;
  cv.addEventListener('touchstart',e=>{if(e.touches.length===1){isDrag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY}},{ passive:true });
  cv.addEventListener('touchmove',e=>{if(!isDrag||e.touches.length!==1)return;e.preventDefault();zPanX+=e.touches[0].clientX-lx;zPanY+=e.touches[0].clientY-ly;lx=e.touches[0].clientX;ly=e.touches[0].clientY;drawCanvas(cv,ctx)},{passive:false});
  cv.addEventListener('touchend',()=>isDrag=false);
}

function loadCanvas(src){
  zScale=1;zPanX=0;zPanY=0;
  const cv=document.getElementById('modal-canvas'),ctx=cv.getContext('2d');
  const side=document.getElementById('modal-left');
  cv.width=side.offsetWidth||420;cv.height=side.offsetHeight||480;
  const img=new Image();img.crossOrigin='anonymous';
  img.onload=()=>{zImg=img;drawCanvas(cv,ctx)};
  img.onerror=()=>{ctx.fillStyle='#111';ctx.fillRect(0,0,cv.width,cv.height);ctx.fillStyle='#555';ctx.font='13px Georgia';ctx.textAlign='center';ctx.fillText('Image loading…',cv.width/2,cv.height/2)};
  img.src=src;
}

function drawCanvas(cv,ctx){
  if(!zImg)return;
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.save();
  ctx.translate(cv.width/2+zPanX,cv.height/2+zPanY);
  ctx.scale(zScale,zScale);
  const r=Math.min(cv.width/zImg.width,cv.height/zImg.height);
  ctx.drawImage(zImg,-zImg.width*r/2,-zImg.height*r/2,zImg.width*r,zImg.height*r);
  ctx.restore();
}

// ── Keyboard ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(document.getElementById('modal-bg').classList.contains('open')){
    if(e.key==='Escape')closeModal();return;
  }
  if(e.key==='ArrowLeft')navigate(-1);
  if(e.key==='ArrowRight')navigate(1);
  if(e.key===' '){e.preventDefault();narrate()}
  if(e.key==='Escape')closeNarr();
  if(e.key==='Enter')openModal();
});

function showHelp(){
  alert('ArtVerse Controls\n\n← → Arrow keys — Navigate artworks\nSpace — AI Narration\nEnter — Open detail view\nEscape — Close / Stop narration\n\nIn detail view:\nScroll — Zoom in/out\nDrag — Pan zoomed image\nDouble-click — Reset zoom\nTouch-drag — Pan on mobile\n\n▶ Guided Tour — Auto-narrate all artworks\n♪ Ambient Sound — Gallery atmosphere audio');
}

init();
</script>
